spring:
  application:
    name: sbirocalendar
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sbirocalendar?createDatabaseIfNotExist=true}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: 'true'
    hibernate:
      ddl-auto: update
    show-sql: 'true'
server:
  port: 8082
  servlet:
    context-path: /sbiro
# JWT — in produzione sovrascrivere con variabili d'ambiente
jwt:
  secret: ${JWT_SECRET:cambia-questa-stringa-in-produzione-deve-essere-lunga}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
# 86400000ms = 24 ore
